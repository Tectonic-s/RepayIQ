name: repayiq
description: "AI-Powered Personal Loan Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local DB
  sqflite: ^2.4.2
  path: ^1.9.1

  # Navigation
  go_router: ^15.1.2

  # Google Sign-In
  google_sign_in: ^6.2.2

  # UI
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Document / Media
  image_picker: ^1.1.2
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^33.1.45

  # AI
  google_generative_ai: ^0.4.7

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  image_path: "assets/images/logo_light.png"
  ios: true
  android: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_light.png"
